name: Apply operating contract instrumentation

on:
  push:
    branches:
      - automation/apply-operating-contract-instrumentation-v2.1.7

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out automation files
        uses: actions/checkout@v4
        with:
          ref: automation/apply-operating-contract-instrumentation-v2.1.7
          path: automation

      - name: Check out target branch
        uses: actions/checkout@v4
        with:
          ref: feat/operating-contract-instrumentation-v2.1.7
          path: target
          fetch-depth: 0

      - name: Apply and push versioned changes
        working-directory: target
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          python ../automation/.automation/operating-contract/apply.py ../automation/.automation/operating-contract
          python - <<'PY'
          from pathlib import Path

          path = Path("../automation/.automation/operating-contract/apply-state-v2.1.9.py")
          text = path.read_text()
          old = '        "## Module F — Technical, source, and artifact discipline",\n        module_e,\n'
          new = '        "---\\n\\n## Module F — Technical, source, and artifact discipline",\n        module_e,\n'
          if old not in text:
              raise RuntimeError("Could not locate Module E boundary in patch runner")
          path.write_text(text.replace(old, new, 1))
          PY
          python ../automation/.automation/operating-contract/apply-state-v2.1.9.py
          git push origin HEAD:feat/operating-contract-instrumentation-v2.1.7
